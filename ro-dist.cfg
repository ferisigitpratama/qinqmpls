/interface ethernet
set [ find default-name=ether1 ] disable-running-check=no
set [ find default-name=ether2 ] disable-running-check=no
set [ find default-name=ether3 ] disable-running-check=no
set [ find default-name=ether4 ] disable-running-check=no
set [ find default-name=ether5 ] disable-running-check=no
/interface vlan
add interface=ether1 name=SITE-A vlan-id=10
add interface=ether1 name=SITE-B vlan-id=20
add interface=ether1 name=SITE-C vlan-id=30
/interface wireless security-profiles
set [ find default=yes ] supplicant-identity=MikroTik
/ip address
add address=192.168.10.1/30 interface=SITE-A network=192.168.10.0
add address=192.168.20.1/30 interface=SITE-B network=192.168.20.0
add address=192.168.30.1/30 interface=SITE-C network=192.168.30.0
/ip dhcp-client
add disabled=no interface=ether1
/system identity
set name=RO-DIST
